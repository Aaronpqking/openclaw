#!/usr/sbin/nft -f

flush ruleset

table inet openclaw_secure {
  set dns_v4 {
    type ipv4_addr
    flags interval
    elements = { 203.0.113.53, 203.0.113.54 }
  }

  set dns_v6 {
    type ipv6_addr
    flags interval
    elements = { 2001:db8::53, 2001:db8::54 }
  }

  set provider_v4 {
    type ipv4_addr
    flags interval
    elements = { 198.51.100.10 }
  }

  set provider_v6 {
    type ipv6_addr
    flags interval
    elements = { 2001:db8:100::10 }
  }

  set observability_v4 {
    type ipv4_addr
    flags interval
    elements = { 198.51.100.30 }
  }

  set observability_v6 {
    type ipv6_addr
    flags interval
    elements = { 2001:db8:100::30 }
  }

  set maintenance_v4 {
    type ipv4_addr
    flags interval
    elements = { 198.51.100.50 }
  }

  set maintenance_v6 {
    type ipv6_addr
    flags interval
    elements = { 2001:db8:100::50 }
  }

  chain input {
    type filter hook input priority 0; policy drop;

    iifname "lo" accept
    ct state established,related accept

    # Replace with your tailnet interface and management policy.
    iifname "tailscale0" tcp dport 22 accept
  }

  chain forward {
    type filter hook forward priority 0; policy drop;
  }

  chain output {
    type filter hook output priority 0; policy drop;

    oifname "lo" accept
    ct state established,related accept

    # DNS
    udp dport 53 ip daddr @dns_v4 accept
    tcp dport 53 ip daddr @dns_v4 accept
    udp dport 53 ip6 daddr @dns_v6 accept
    tcp dport 53 ip6 daddr @dns_v6 accept

    # Model/API providers intentionally used by this host.
    tcp dport 443 ip daddr @provider_v4 accept
    tcp dport 443 ip6 daddr @provider_v6 accept

    # Optional observability only if intentionally enabled.
    tcp dport 443 ip daddr @observability_v4 accept
    tcp dport 443 ip6 daddr @observability_v6 accept

    # Maintenance-window destinations only. Keep the sets empty or disabled outside maintenance windows.
    tcp dport { 80, 443 } ip daddr @maintenance_v4 accept
    tcp dport { 80, 443 } ip6 daddr @maintenance_v6 accept

    # Tailscale control/data-plane endpoints are intentionally NOT hardcoded here.
    # Populate dedicated sets or use a separate outbound proxy before enforcing
    # default-deny on a live host that depends on tailscaled.
  }
}
