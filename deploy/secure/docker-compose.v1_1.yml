services:
  openclaw:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        OPENCLAW_INSTALL_BROWSER: ${OPENCLAW_INSTALL_BROWSER:-0}
        OPENCLAW_BUILD_GOG: ${OPENCLAW_BUILD_GOG:-1}
        OPENCLAW_INSTALL_GOG: ${OPENCLAW_INSTALL_GOG:-1}
    image: openclaw:secure-v1_1
    init: true
    restart: unless-stopped
    network_mode: host
    command: ["node", "dist/index.js", "gateway", "--bind", "loopback", "--port", "18789"]
    environment:
      HOME: /home/node
      XDG_CONFIG_HOME: /home/node/.openclaw/xdg-config
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_PASSWORD: ${OPENCLAW_GATEWAY_PASSWORD:-}
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m
      - /run:rw,noexec,nosuid,nodev,size=16m
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    cap_drop:
      - ALL
    volumes:
      - ${HOME}/.openclaw:/home/node/.openclaw
      - ${HOME}/.openclaw/workspace:/home/node/.openclaw/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18789/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
